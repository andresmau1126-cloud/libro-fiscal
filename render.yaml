services:
  - type: web
    name: render4
    env: docker
    branch: master
    plan: starter
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        value: "RENDER_SECRET_KEY"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: libro-fiscal-db
          property: DATABASE_URL

databases:
  - type: postgres
    name: libro-fiscal-db
    databaseName: libro_fiscal
    plan: starter
